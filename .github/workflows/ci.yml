name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - run: go work sync
      - run: go test ./...
        working-directory: shared/go
      - run: go test ./...
        working-directory: home-server

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - run: go work sync
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o go-home-server ./cmd/home-server
        working-directory: home-server
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o go-home-server-arm64 ./cmd/home-server
        working-directory: home-server
      - name: Upload home-server binary
        uses: actions/upload-artifact@v4
        with:
          name: go-home-server-linux-amd64
          path: home-server/go-home-server
      - name: Upload home-server binary arm64
        uses: actions/upload-artifact@v4
        with:
          name: go-home-server-linux-arm64
          path: home-server/go-home-server-arm64

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: microsoft/setup-msbuild@v2
      - run: go work sync
      - name: Build Go home-server core for Windows
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -o go-home-home-server-windows-amd64.exe ./cmd/home-server
        working-directory: home-server
      - name: Publish WinUI3 home-server app
        shell: pwsh
        run: |
          msbuild .\home-server-windows\GoHome.HomeServer.Windows.csproj `
            /restore `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:PublishDir="$PWD\artifacts\go-home-home-server-windows\"
      - name: Upload Windows home-server app
        uses: actions/upload-artifact@v4
        with:
          name: go-home-home-server-windows-x64
          path: artifacts/go-home-home-server-windows

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: go-home-server-linux-amd64
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: go-home-server
          generate_release_notes: true
