name: CI

on:
  push:
  pull_request:

jobs:
  home-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - run: go work sync
      - run: go test ./...
        working-directory: shared/go
      - run: go test ./...
        working-directory: home-server
      - run: go build ./cmd/home-server
        working-directory: home-server
