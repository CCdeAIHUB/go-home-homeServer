name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - run: go work sync
      - run: go test ./...
        working-directory: shared/go
      - run: go test ./...
        working-directory: home-server

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - run: go work sync
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o go-home-server ./cmd/home-server
        working-directory: home-server
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o go-home-server-arm64 ./cmd/home-server
        working-directory: home-server
      - name: Upload home-server binary
        uses: actions/upload-artifact@v4
        with:
          name: go-home-server-linux-amd64
          path: home-server/go-home-server
      - name: Upload home-server binary arm64
        uses: actions/upload-artifact@v4
        with:
          name: go-home-server-linux-arm64
          path: home-server/go-home-server-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: go-home-server-linux-amd64
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: go-home-server
          generate_release_notes: true
